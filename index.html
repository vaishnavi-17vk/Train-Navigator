<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrainNav — Secure Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #7F77DD;
            --accent-dark: #6559bc;
            --surface: #1e1e2e;
            --surface-2: #28283d;
            --background: #13131f;
            --text: #ffffff;
            --text-2: #9898b0;
            --text-3: #6b6b83;
            --border: #2d2d44;
            --radius: 16px;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--background);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--surface);
            padding: 40px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section { text-align: center; margin-bottom: 32px; }
        .logo-icon { font-size: 50px; margin-bottom: 12px; filter: drop-shadow(0 0 10px var(--accent)); }
        .logo-text { font-size: 28px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
        .logo-sub { font-size: 14px; color: var(--text-2); margin-top: 4px; }

        .auth-tabs { display: flex; background: var(--background); padding: 5px; border-radius: 12px; margin-bottom: 24px; border: 1px solid var(--border); }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; font-family: inherit; font-weight: 600; font-size: 14px; color: var(--text-3); cursor: pointer; border-radius: 8px; transition: all 0.3s; }
        .tab-btn.active { background: var(--surface-2); color: var(--accent); }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 8px; }
        .form-control {
            width: 100%;
            padding: 14px;
            background: var(--background);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text);
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-control:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(127, 119, 221, 0.15); }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(127, 119, 221, 0.3);
        }
        .btn-primary:hover { background: var(--accent-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(127, 119, 221, 0.4); }
        .btn-primary:active { transform: translateY(0); }

        .message { margin-top: 20px; padding: 12px; border-radius: 10px; font-size: 13px; text-align: center; display: none; }
        .message.error { background: rgba(220, 38, 38, 0.1); color: #ef4444; border: 1px solid rgba(220, 38, 38, 0.2); display: block; }
        .message.success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); display: block; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo-section">
            <div class="logo-icon">🚇</div>
            <div class="logo-text">TrainNav</div>
            <div class="logo-sub">DSA Network Dashboard Control</div>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchMode('login')">Sign In</button>
            <button class="tab-btn" id="tab-signup" onclick="switchMode('signup')">Sign Up</button>
        </div>

        <div id="login-form">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" id="login-user" class="form-control" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="login-pass" class="form-control" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="handleLogin()">Sign In</button>
        </div>

        <div id="signup-form" style="display:none">
            <div class="form-group">
                <label class="form-label">Create Username</label>
                <input type="text" id="signup-user" class="form-control" placeholder="Choose username">
            </div>
            <div class="form-group">
                <label class="form-label">Create Password</label>
                <input type="password" id="signup-pass" class="form-control" placeholder="Create password">
            </div>
            <button class="btn-primary" onclick="handleSignup()">Create Account</button>
        </div>

        <div id="auth-msg" class="message"></div>
    </div>

    <script>
        let mode = 'login';

        function switchMode(newMode) {
            mode = newMode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
            document.getElementById('login-form').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('signup-form').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('auth-msg').style.display = 'none';
        }

        function handleLogin() {
            const user = document.getElementById('login-user').value.trim();
            const pass = document.getElementById('login-pass').value.trim();

            if(!user || !pass) return showError("Fields cannot be empty");

            // Hardcoded Admin Check
            if(user === 'admin' && pass === 'admin123') {
                const session = { username: 'admin', role: 'admin' };
                localStorage.setItem('train_nav_session', JSON.stringify(session));
                showSuccess("Admin Verified. Loading Panel...");
                setTimeout(() => window.location.href = 'frontend/admin.html', 800);
                return;
            }

            // Normal User Check
            const savedUsers = JSON.parse(localStorage.getItem('train_nav_users') || '[]');
            const found = savedUsers.find(u => u.username === user && u.password === pass);

            if(found) {
                const session = { username: found.username, role: 'user' };
                localStorage.setItem('train_nav_session', JSON.stringify(session));
                showSuccess("Welcome Back! Redirecting...");
                setTimeout(() => window.location.href = 'frontend/user.html', 800);
            } else {
                showError("Invalid credentials");
            }
        }

        function handleSignup() {
            const user = document.getElementById('signup-user').value.trim();
            const pass = document.getElementById('signup-pass').value.trim();

            if(!user || !pass) return showError("Fields cannot be empty");
            if(user === 'admin') return showError("Username 'admin' is reserved");

            const savedUsers = JSON.parse(localStorage.getItem('train_nav_users') || '[]');
            if(savedUsers.find(u => u.username === user)) return showError("Username exists");

            savedUsers.push({ username: user, password: pass });
            localStorage.setItem('train_nav_users', JSON.stringify(savedUsers));
            
            showSuccess("Account created! Redirecting to login...");
            setTimeout(() => switchMode('login'), 1200);
        }

        function showError(txt) {
            const msg = document.getElementById('auth-msg');
            msg.textContent = txt;
            msg.className = 'message error';
            msg.style.display = 'block';
        }

        function showSuccess(txt) {
            const msg = document.getElementById('auth-msg');
            msg.textContent = txt;
            msg.className = 'message success';
            msg.style.display = 'block';
        }
        
        // Auto-redirect if logged in
        const session = localStorage.getItem('train_nav_session');
        if(session) {
            const parsed = JSON.parse(session);
            window.location.href = parsed.role === 'admin' ? 'frontend/admin.html' : 'frontend/user.html';
        }
    </script>
</body>
</html>
